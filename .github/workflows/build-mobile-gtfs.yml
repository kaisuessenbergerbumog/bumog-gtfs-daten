name: Mobile GTFS erzeugen

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Vollstaendigen GTFS-Datensatz laden
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download v1 --pattern gtfs.zip --clobber

      - name: Mobile GTFS-Datei erzeugen
        run: python3 scripts/build_mobile_gtfs.py gtfs.zip gtfs-mobile.zip

      - name: Mobile GTFS-Datei in Release v1 aktualisieren
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v1 gtfs-mobile.zip --clobber
